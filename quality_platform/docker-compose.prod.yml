version: '3.8'

services:
  backend:
    build:
      context: .. # Build from parent dir to include quality_bot
      dockerfile: quality_platform/backend/Dockerfile
    ports:
      - "127.0.0.1:9005:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/quality_platform/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://aref.thetransformix.com
    ports:
      - "127.0.0.1:9000:3000"
    restart: unless-stopped
    depends_on:
      - backend
